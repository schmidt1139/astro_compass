# SAC TBR polar pretraining configuration

[model.paths]
tb_log_name = "SAC_TBR_training"
output_dir = "SAC_Training"
path_training_data = ""
path_replay_buffer = "buffer_generation/SAC_training_TBR_polar20251128_144703/replay_buffer.pkl"
path_SAC_model_load = "SAC_Training/SAC_training_TBR_polar20251127_202634/best_model.zip"

[model.training]
save_final_replay_buffer = true
load_model_checkpoint = false
eval_freq = 500
pretrain_gradient_steps = 5000
n_eval_episodes = 3
print_freq = 2000
buffer_size = 200_000
batch_size = 256
pt_log_interval = 2000
t_log_interval = 2000
loss_report_rate = 10
checkpoint_freq = 1000
flag_checkpoint_replay_buffer = true
n_freq_checkpoint_replay_buffer = 100

[model.pretraining]
pre_train_networks = true
save_pre_training_only_replay_buffer = true
read_replay_buffer = true
training_steps = 1_600
buffer_size = 200_000
num_ephems_to_use = 1000
batch_size = 256


[model]
learning_rate = 0.0003
tau = 0.005
train_freq = 1
train_freq_unit = "step" # or step 
gradient_steps = 1
max_grad_norm = 0.5
nn_arch_type = "custom"
net_arch = [256, 256]
eval_device = "cuda"
